# Example: Multi-Tenant SaaS — Configuration

agent:
  name: saas-agent
  version: "1.0.0"

ports:
  llm:
    adapter: litellm
    config:
      model: gpt-4o-mini
      temperature: 0.5
      max_tokens: 4096
  orchestration:
    adapter: temporal
    config:
      host: localhost:7233
      namespace: agentforge
      task_queue: saas-tasks
  working_memory:
    adapter: redis
    config:
      host: localhost
      port: 6379
      ttl_seconds: 3600
  semantic_memory:
    adapter: qdrant
    config:
      host: localhost
      port: 6333
      collection: semantic_memory
      embedding_size: 1536
  episodic_memory:
    adapter: postgres
    config:
      dsn: postgresql://user:pass@localhost:5432/agentforge
      pool_min: 2
      pool_max: 10
  procedural_memory:
    adapter: default
    config:
      skills_path: "./skills"
  tool_registry:
    adapter: default
    config: {}
  event_bus:
    adapter: nats
    config:
      servers: ["nats://localhost:4222"]
      stream: agentforge
  trace:
    adapter: default
    config:
      output_path: "./traces"
  eval:
    adapter: default
    config: {}
  analytics:
    adapter: clickhouse
    enabled: true
    config:
      host: localhost
      port: 9000
      database: agentforge
      table: run_metrics

guardrails:
  max_iterations: 30
  token_budget: 200000
  timeout_seconds: 300
