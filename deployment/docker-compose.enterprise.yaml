# AgentForge — Déploiement enterprise (v0.5)
# Stack complète : API + Redis + Qdrant + PostgreSQL + Temporal + NATS + ClickHouse

version: "3.8"

services:
  # ─── Application ──────────────────────────────────────────────────────────
  agentforge:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./recipes:/app/recipes
      - ./data:/app/data
      - ./skills:/app/skills
      - ./traces:/app/traces
    environment:
      - AGENTFORGE_CONFIG=recipes/recipe-enterprise.yaml
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      nats:
        condition: service_started
      clickhouse:
        condition: service_started
    command: >
      sh -c "python -m agentforge_api.main recipes/recipe-enterprise.yaml"

  # ─── Mémoire de travail ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s

  # ─── Mémoire sémantique vectorielle ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── Mémoire persistante (sémantique + épisodique) ───────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: agentforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agentforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Orchestration durable ───────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Event Bus asynchrone ────────────────────────────────────────────────
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats_data:/data

  # ─── Analytique OLAP ─────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  redis_data:
  qdrant_data:
  postgres_data:
  nats_data:
  clickhouse_data:
